<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinAccruals</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #f6f8fb; color: #1f2937; }
    main { max-width: 760px; margin: 60px auto; padding: 32px; background: #fff; border-radius: 14px; box-shadow: 0 8px 28px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    code { background: #eef2ff; padding: 3px 6px; border-radius: 5px; }
  </style>
</head>
<body>
  <main>
<h1>FinAccruals Environment Status</h1>

<div>
  <p>✅ GitHub Repository Connected</p>
  <p>✅ Vercel Deployment Active</p>
  <p>✅ API Health Check Passed</p>
  <p>🟡 Supabase Integration Pending</p>
</div>

<button onclick="checkHealth()">Verify Connection</button>

<div id="result"></div>

<script>
async function checkHealth() {
  const response = await fetch('/api/health');
  const data = await response.json();

  document.getElementById('result').innerHTML =
    `✅ Connected<br>
     Status: ${data.status}<br>
     App: ${data.app}`;
}
</script>
  </main>
</body>
</html>
